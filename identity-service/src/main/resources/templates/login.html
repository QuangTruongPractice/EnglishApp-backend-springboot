<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EnglishApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="brand-logo">EA</div>
            <h1>Identity Service</h1>
            <p>Welcome to EnglishApp! Please enter your details.</p>
        </div>

        <div th:if="${param.denied}" class="alert alert-danger">
            <strong>Truy cập bị từ chối!</strong> Tài khoản của bạn không có quyền truy cập trang quản trị. Chỉ Admin hoặc Staff mới được phép đăng nhập.
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <strong>Đăng nhập thất bại!</strong> Sai tên đăng nhập hoặc mật khẩu.
        </div>

        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required
                    autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">
                Sign in
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"></path>
                    <path d="m12 5 7 7-7 7"></path>
                </svg>
            </button>
        </form>
    </div>
</body>

</html>
