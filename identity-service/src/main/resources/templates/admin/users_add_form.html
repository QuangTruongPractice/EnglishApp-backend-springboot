<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('Add User', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<body>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Add New User</h2>
                <p class="text-muted">Create a new system user account.</p>
            </div>
            <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Back to List</a>
        </div>

        <div class="premium-card p-4">
            <form th:action="@{/admin/users/add}" th:object="${user}" method="post" enctype="multipart/form-data"
                class="row g-4" novalidate>

                <!-- Username -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" th:field="*{username}" class="form-control" placeholder="Enter username" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}"
                        th:errors="*{username}">
                    </div>
                </div>

                <!-- Password -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}"
                        th:errors="*{password}">
                    </div>
                </div>

                <!-- Email -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="example@domain.com" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                    </div>
                </div>

                <!-- First Name -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control" placeholder="Enter first name" />
                </div>

                <!-- Last Name -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control" placeholder="Enter last name" />
                </div>

                <!-- Date of Birth -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Date of Birth</label>
                    <input type="date" th:field="*{dob}" class="form-control" />
                </div>

                <!-- Avatar -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Avatar Image</label>
                    <input type="file" th:field="*{avatar}" class="form-control" accept="image/*" />
                </div>

                <!-- Roles -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Roles</label>
                    <select th:field="*{roles}" class="form-select" multiple size="5">
                        <option th:each="role : ${allRoles}" th:value="${role.name}" th:text="${role.name}">ADMIN
                        </option>
                    </select>
                    <div class="text-muted small mt-1">Hold Ctrl/Cmd to select multiple roles. Each role includes its
                        own permissions.</div>
                </div>

                <!-- Status -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Account Status</label>
                    <select th:field="*{isActive}" class="form-select">
                        <option th:value="true">Active</option>
                        <option th:value="false">Inactive</option>
                    </select>
                </div>

                <!-- Submit -->
                <div class="col-12 mt-5 border-top pt-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Create User</button>
                        <a th:href="@{/admin/users}" class="btn btn-light px-4">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
