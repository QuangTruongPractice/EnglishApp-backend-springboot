<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('User Management', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<body>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">User Management</h2>
                <p class="text-muted">Manage system users and their permissions.</p>
            </div>
            <a th:href="@{/admin/users/add}" class="btn btn-primary d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <line x1="19" x2="19" y1="8" y2="14"></line>
                    <line x1="16" x2="22" y1="11" y2="11"></line>
                </svg>
                Add New User
            </a>
        </div>

        <!-- Messages -->
        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" x2="12" y1="8" y2="12"></line>
                <line x1="12" x2="12" y1="16" y2="16"></line>
            </svg>
            <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span th:text="${successMessage}"></span>
        </div>

        <!-- Search Section -->
        <div class="premium-card p-4 mb-4">
            <form class="row g-3" method="get" action="">
                <div class="col-lg-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="text-muted">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" x2="21" y1="21" y2="16.65"></line>
                                <line x1="21" x2="16.65" y1="21" y2="21"></line>
                            </svg>
                        </span>
                        <input type="text" name="keyword" class="form-control border-start-0 ps-0"
                            placeholder="Search by email, username, or full name..." th:value="${keyword}">
                    </div>
                </div>
                <div class="col-lg-4">
                    <button class="btn btn-primary w-100">Search</button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="table-container shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>User</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user, iterStat : ${users}">
                            <td><span class="text-muted" th:text="${iterStat.index + 1}"></span></td>
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:if="${user.avatar != null}" th:src="${user.avatar}" alt="Avatar"
                                        style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                                    <div th:if="${user.avatar == null}"
                                        style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light, #e0e7ff); display: flex; align-items: center; justify-content: center;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                            viewBox="0 0 24 24" fill="none" stroke="var(--primary, #4f46e5)"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                            <circle cx="12" cy="7" r="4"></circle>
                                        </svg>
                                    </div>
                                    <div>
                                        <div class="fw-bold" th:text="${user.username}"></div>
                                        <div class="text-muted small" th:text="${user.firstName + ' ' + user.lastName}">
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <div class="d-flex flex-wrap gap-1">
                                    <span th:each="role : ${user.roles}" 
                                          class="badge" 
                                          th:text="${role.name}"
                                          th:classappend="${role.name == 'ADMIN' ? 'bg-primary' : 'bg-secondary'}"></span>
                                </div>
                            </td>
                            <td>
                                <span th:text="${user.isActive ? 'Active' : 'Inactive'}"
                                    th:classappend="${user.isActive} ? 'badge bg-success-subtle text-success border border-success' : 'badge bg-danger-subtle text-danger border border-danger'"></span>
                            </td>
                            <td
                                th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy') : ''}">
                            </td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{'/admin/users/edit/' + ${user.id}}"
                                        class="btn btn-sm btn-outline-warning">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path>
                                            <path d="m15 5 4 4"></path>
                                        </svg>
                                    </a>
                                    <form th:action="@{'/admin/users/delete/' + ${user.id}}" method="post"
                                        class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Delete this user permanently?')">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M3 6h18"></path>
                                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                                <line x1="10" x2="10" y1="11" y2="17"></line>
                                                <line x1="14" x2="14" y1="11" y2="17"></line>
                                            </svg>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="7" class="text-center py-5">
                                <div class="text-muted">No users found matching your search.</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-center mt-4" th:if="${totalPages > 1}">
            <nav aria-label="Page navigation">
                <ul class="pagination gap-2 border-0">
                    <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                        <a class="page-link rounded-pill px-3"
                            th:href="@{''(email=${param.email}, page=${currentPage - 1})}">Previous</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link border-0 bg-transparent text-dark fw-bold"
                            th:text="'Page ' + ${currentPage} + ' of ' + ${totalPages}"></span>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                        <a class="page-link rounded-pill px-3"
                            th:href="@{''(email=${param.email}, page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
</body>

</html>
