<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('Videos', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<body>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1" th:text="${videos.id == null ? 'Create Video' : 'Update Video'}"></h2>
                <p class="text-muted">Manage educational video links from YouTube.</p>
            </div>
            <a th:href="@{/admin/videos}" class="btn btn-outline-secondary">Back to List</a>
        </div>

        <div class="premium-card p-4">
            <form th:action="@{/admin/videos/add}" th:object="${videos}" method="post" class="row g-4" novalidate>
                <input type="hidden" th:field="*{id}" />

                <div class="col-md-12">
                    <label class="form-label fw-semibold">YouTube URL</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="text-danger">
                                <path
                                    d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z">
                                </path>
                                <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
                            </svg>
                        </span>
                        <input type="text" th:field="*{youtubeUrl}" class="form-control border-start-0 ps-0" required
                            placeholder="e.g. https://www.youtube.com/watch?v=..." />
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('youtubeUrl')}"
                        th:errors="*{youtubeUrl}"></div>
                </div>

                <div class="col-12 mt-5 border-top pt-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Save Video</button>
                        <a th:href="@{/admin/videos}" class="btn btn-light px-4">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
