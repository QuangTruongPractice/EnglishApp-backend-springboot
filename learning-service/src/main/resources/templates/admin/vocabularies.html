<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('Vocabularies', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<body>
    <section>
        <!-- Flash Messages for Modal -->
        <div th:if="${successMessage}" id="successMessageField" th:text="${successMessage}" class="d-none"></div>
        <div th:if="${errorMessage}" id="errorMessageField" th:text="${errorMessage}" class="d-none"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Vocabulary Management</h2>
                <p class="text-muted">Manage the core dictionary and word associations.</p>
            </div>
            <a th:href="@{/admin/vocabularies/add}" class="btn btn-primary d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m11 17 2 2 4-4"></path>
                    <path d="m3 17 2 2 4-4"></path>
                    <path d="M13 6h8"></path>
                    <path d="M13 12h8"></path>
                    <path d="M13 18h8"></path>
                </svg>
                Add New Word
            </a>
        </div>

        <!-- Search Section -->
        <div class="premium-card p-4 mb-4">
            <form class="row g-3" method="get" action="">
                <div class="col-lg-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="text-muted">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" x2="21" y1="21" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" name="word" class="form-control border-start-0 ps-0"
                            placeholder="Search by word or keyword..." th:value="${param.word}">
                    </div>
                </div>
                <div class="col-lg-4">
                    <button class="btn btn-primary w-100">Search</button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="table-container shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Word</th>
                            <th>Phonetic</th>
                            <th>VN Word</th>
                            <th>Sub Topics</th>
                            <th>Types</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="vocab, iterStat : ${vocabularies}">
                            <td><span class="text-muted" th:text="${iterStat.index + 1}"></span></td>
                            <td>
                                <div class="fw-bold fs-5 text-primary" th:text="${vocab.word}"></div>
                                <small class="text-muted d-block text-truncate" style="max-width: 200px;"
                                    th:if="${vocab.meanings != null and !vocab.meanings.isEmpty()}"
                                    th:text="${vocab.meanings[0].definition}"></small>
                            </td>
                            <td class="text-muted font-monospace" th:text="${vocab.phonetic}"></td>
                            <td>
                                <span th:if="${vocab.meanings != null and !vocab.meanings.isEmpty()}"
                                    th:text="${vocab.meanings[0].vnWord}"></span>
                            </td>
                            <td>
                                <div class="d-flex flex-wrap gap-1" style="max-width: 200px;">
                                    <span th:each="sub : ${vocab.subTopics}"
                                        class="badge bg-secondary-subtle text-secondary border border-secondary"
                                        th:text="${sub.name}"></span>
                                </div>
                            </td>
                            <td>
                                <div class="d-flex flex-wrap gap-1">
                                    <span th:each="m : ${vocab.meanings}"
                                        class="badge bg-info-subtle text-info border border-info"
                                        th:text="${m.type}"></span>
                                </div>
                            </td>

                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{'/admin/vocabularies/edit/' + ${vocab.id}}"
                                        class="btn btn-sm btn-outline-warning">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path>
                                            <path d="m15 5 4 4"></path>
                                        </svg>
                                    </a>
                                    <form th:action="@{'/admin/vocabularies/delete/' + ${vocab.id}}" method="post"
                                        class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Delete this word?')">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M3 6h18"></path>
                                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                            </svg>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-center mt-4" th:if="${totalPages > 1}">
            <nav>
                <ul class="pagination gap-2 border-0">
                    <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                        <a class="page-link rounded-pill px-3"
                            th:href="@{''(word=${param.word}, page=${currentPage - 1})}">Previous</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link border-0 bg-transparent text-dark fw-bold"
                            th:text="'Page ' + ${currentPage} + ' of ' + ${totalPages}"></span>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                        <a class="page-link rounded-pill px-3"
                            th:href="@{''(word=${param.word}, page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
</body>

</html>
