<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('Main Topics', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<body>
    <section>
        <!-- Flash Messages for Modal -->
        <div th:if="${successMessage}" id="successMessageField" th:text="${successMessage}" class="d-none"></div>
        <div th:if="${errorMessage}" id="errorMessageField" th:text="${errorMessage}" class="d-none"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Main Topic Management</h2>
                <p class="text-muted">Manage main educational topics and their associations.</p>
            </div>
            <a th:href="@{/admin/topics/add}" class="btn btn-primary d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                </svg>
                Add New Topic
            </a>
        </div>

        <!-- Search Section -->
        <div class="premium-card p-4 mb-4">
            <form class="row g-3" method="get" action="">
                <div class="col-lg-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="text-muted">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" x2="21" y1="21" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" name="name" class="form-control border-start-0 ps-0"
                            placeholder="Search by topic name..." th:value="${param.name}">
                    </div>
                </div>
                <div class="col-lg-4">
                    <button class="btn btn-primary w-100">Search</button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="table-container shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle text-nowrap">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Preview</th>
                            <th>Name</th>
                            <th>Goal</th>
                            <th>Order</th>
                            <th>Sub Topics</th>
                            <th>Created At</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="topic, iterStat : ${topics}">
                            <td><span class="text-muted" th:text="${iterStat.index + 1}"></span></td>
                            <td>
                                <img th:src="${topic.image}" alt="Topic" class="rounded"
                                    style="width: 60px; height: 40px; object-fit: cover; border: 1px solid #e2e8f0;">
                            </td>
                            <td>
                                <div class="fw-bold" th:text="${topic.name}"></div>
                            </td>
                            <td>
                                <span class="badge bg-secondary text-white" th:text="${topic.goal}"></span>
                            </td>
                            <td>
                                <span class="fw-bold text-primary" th:text="${topic.topicOrder}"></span>
                            </td>
                            <td>
                                <div class="d-flex flex-wrap gap-1" style="max-width: 300px;">
                                    <span th:each="sub : ${topic.subTopics}"
                                        class="badge bg-primary-light text-primary fw-medium" th:text="${sub.name}">
                                    </span>
                                    <span th:if="${#lists.isEmpty(topic.subTopics)}" class="text-muted small italic">No
                                        subtopics</span>
                                </div>
                            </td>
                            <td th:text="${#temporals.format(topic.createdAt, 'dd/MM/yyyy')}"></td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <a th:href="@{'/admin/topics/edit/' + ${topic.id}}"
                                        class="btn btn-sm btn-outline-warning">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path>
                                            <path d="m15 5 4 4"></path>
                                        </svg>
                                    </a>
                                    <form th:action="@{'/admin/topics/delete/' + ${topic.id}}" method="post"
                                        class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Delete this topic?')">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M3 6h18"></path>
                                                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                            </svg>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-center mt-4" th:if="${totalPages > 1}">
            <nav>
                <ul class="pagination gap-2 border-0">
                    <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                        <a class="page-link rounded-pill px-3"
                            th:href="@{''(name=${param.name}, page=${currentPage - 1})}">Previous</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link border-0 bg-transparent text-dark fw-bold"
                            th:text="'Page ' + ${currentPage} + ' of ' + ${totalPages}"></span>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                        <a class="page-link rounded-pill px-3"
                            th:href="@{''(name=${param.name}, page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
</body>

</html>
