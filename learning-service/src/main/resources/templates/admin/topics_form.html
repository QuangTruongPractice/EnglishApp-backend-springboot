<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout('Main Topics', ~{::section})}" xmlns:th="http://www.thymeleaf.org">

<body>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1" th:text="${topics.id == null ? 'Create Main Topic' : 'Update Main Topic'}">
                </h2>
                <p class="text-muted">Manage main categories and their display images.</p>
            </div>
            <a th:href="@{/admin/topics}" class="btn btn-outline-secondary">Back to List</a>
        </div>

        <div class="premium-card p-4">
            <form th:action="@{/admin/topics/add}" th:object="${topics}" method="post" enctype="multipart/form-data"
                class="row g-4" novalidate>

                <input type="hidden" th:field="*{id}" />

                <div class="col-md-12">
                    <label class="form-label fw-semibold">Topic Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required
                        placeholder="Enter topic name" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-semibold">Learning Goal</label>
                    <select th:field="*{goal}" class="form-select" required>
                        <option value="" disabled selected>Select a learning goal</option>
                        <option th:each="goal : ${goals}" th:value="${goal}" th:text="${goal}"></option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('goal')}" th:errors="*{goal}"></div>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-semibold">Topic Order</label>
                    <input type="number" th:field="*{topicOrder}" class="form-control"
                        placeholder="Enter display order (e.g. 1, 2, 3)" />
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('topicOrder')}"
                        th:errors="*{topicOrder}"></div>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-semibold">Display Image</label>
                    <input type="file" th:field="*{image}" class="form-control" accept="image/*" />
                    <div class="mt-3" th:if="${topics.image != null}">
                        <div class="text-muted small mb-2">Current Image:</div>
                        <img th:src="@{${topics.image}}" alt="Topic Image"
                            style="width: 120px; height: 120px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);" />
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('image')}" th:errors="*{image}">
                    </div>
                </div>

                <div class="col-12 mt-5 border-top pt-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">Save Topic</button>
                        <a th:href="@{/admin/topics}" class="btn btn-light px-4">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
