<!DOCTYPE html>
<html th:fragment="layout(title, content)" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Admin EnglishApp'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <header class="mobile-header">
        <button class="btn border-0 p-0" id="sidebarToggle">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" x2="20" y1="12" y2="12"></line>
                <line x1="4" x2="20" y1="6" y2="6"></line>
                <line x1="4" x2="20" y1="18" y2="18"></line>
            </svg>
        </button>
        <span class="fw-bold">EnglishApp Admin</span>
        <div style="width: 24px;"></div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div
                style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;">
                EA</div>
            <span>EnglishApp</span>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-item">
                <a th:href="@{/admin}" class="nav-link" th:classappend="${title == 'Dashboard' ? 'active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="9" x="3" y="3" rx="1"></rect>
                        <rect width="7" height="5" x="14" y="3" rx="1"></rect>
                        <rect width="7" height="9" x="14" y="12" rx="1"></rect>
                        <rect width="7" height="5" x="3" y="16" rx="1"></rect>
                    </svg>
                    Dashboard
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/admin/topics}" class="nav-link"
                    th:classappend="${title == 'Main Topics' ? 'active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                    </svg>
                    Main Topics
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/admin/subTopics}" class="nav-link"
                    th:classappend="${title == 'Sub Topics' ? 'active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Sub Topics
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/admin/vocabularies}" class="nav-link"
                    th:classappend="${title == 'Vocabularies' ? 'active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m11 17 2 2 4-4"></path>
                        <path d="m3 17 2 2 4-4"></path>
                        <path d="M13 6h8"></path>
                        <path d="M13 12h8"></path>
                        <path d="M13 18h8"></path>
                        <path d="M3 6h2"></path>
                        <path d="M3 12h2"></path>
                    </svg>
                    Vocabularies
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/admin/videos}" class="nav-link" th:classappend="${title == 'Videos' ? 'active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m22 8-6 4 6 4V8Z"></path>
                        <rect width="14" height="12" x="2" y="6" rx="2" ry="2"></rect>
                    </svg>
                    Videos
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/admin/quizs}" class="nav-link" th:classappend="${title == 'Quizzes' ? 'active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    Quizzes
                </a>
            </div>
            <div class="nav-item">
                <a th:href="@{/admin/answers}" class="nav-link" th:classappend="${title == 'Answers' ? 'active' : ''}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Answers
                </a>
            </div>
            <div class="nav-item" sec:authorize="isAuthenticated()">
                <a th:href="@{/logout}" class="nav-link logout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" x2="9" y1="12" y2="12"></line>
                    </svg>
                    Logout
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-wrapper">
        <div th:replace="${content}"></div>
    </main>

    <!-- Notification Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
                <div class="modal-body p-4 text-center">
                    <div id="modalIconContainer" class="mb-3 mx-auto d-flex align-items-center justify-content-center"
                        style="width: 64px; height: 64px; border-radius: 50%;">
                        <!-- Success Icon -->
                        <svg id="successIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <!-- Error Icon -->
                        <svg id="errorIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y2="6" y1="18" x2="6"></line>
                            <line x1="6" y2="6" y1="18" x2="18"></line>
                        </svg>
                    </div>
                    <h4 id="modalTitle" class="fw-bold mb-2">Notification</h4>
                    <p id="modalMessage" class="text-muted mb-4 px-3"></p>
                    <button type="button" class="btn btn-primary w-100 py-2 fw-semibold" data-bs-dismiss="modal"
                        style="border-radius: 10px;">Đã hiểu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>

</html>
